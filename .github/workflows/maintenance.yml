# ================================================================
#  WORKFLOW 4: Maintenance (runs on a schedule, fully automatic)
#
#  Schedule:
#    - Security audit:  every Monday 9am UTC
#    - Stale cleanup:   every day at midnight
#
#  Both can also be triggered manually from GitHub UI
# ================================================================
 
name: Scheduled Maintenance
 
on:
  schedule:
    - cron: "0 9 * * 1"    # Every Monday 9:00 AM UTC  → security audit
    - cron: "0 0 * * *"    # Every day   midnight UTC  → stale issues
  workflow_dispatch:         # Manual trigger button in GitHub UI
    inputs:
      task:
        description: "Which task to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - audit
          - stale
 
jobs:
 
  # ──────────────────────────────────────────────────────────────
  # JOB 1: npm security audit
  # ──────────────────────────────────────────────────────────────
  security-audit:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.task == 'all' ||
      github.event.inputs.task == 'audit'
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
 
      - name: Install dependencies
        run: npm ci
 
      - name: Run full audit report
        run: |
          echo "═══════════════════════════════"
          echo "  Security Audit — $(date -u)"
          echo "═══════════════════════════════"
          npm audit || true
 
      - name: Check for outdated packages
        run: |
          echo ""
          echo "═══════════════════════════════"
          echo "  Outdated Packages"
          echo "═══════════════════════════════"
          npm outdated || true
 
      - name: Fail on critical vulnerabilities
        run: |
          CRITICAL=$(npm audit --audit-level=critical --json 2>/dev/null \
            | node -e "
              let d='';process.stdin.on('data',c=>d+=c);
              process.stdin.on('end',()=>{
                try {
                  const r=JSON.parse(d);
                  const count=Object.values(r.vulnerabilities||{})
                    .filter(v=>v.severity==='critical').length;
                  console.log(count);
                } catch(e){console.log(0);}
              });
            " 2>/dev/null || echo "0")
 
          echo "Critical vulnerabilities: $CRITICAL"
 
          if [ "$CRITICAL" -gt "0" ]; then
            echo "⛔ ACTION REQUIRED: $CRITICAL critical vulnerability/vulnerabilities found!"
            exit 1
          else
            echo "✅ No critical vulnerabilities found."
          fi
 
      - name: Write audit summary
        run: |
          echo "## 🔐 Security Audit — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npm audit --json 2>/dev/null | node -e "
            let d='';process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try {
                const r=JSON.parse(d);
                const v=r.metadata?.vulnerabilities||{};
                console.log('| Severity | Count |');
                console.log('|----------|-------|');
                console.log('| Critical | ' + (v.critical||0) + ' |');
                console.log('| High     | ' + (v.high||0) + ' |');
                console.log('| Moderate | ' + (v.moderate||0) + ' |');
                console.log('| Low      | ' + (v.low||0) + ' |');
              } catch(e){console.log('Could not parse audit output.');}
            });
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No audit data." >> $GITHUB_STEP_SUMMARY
 
 
  # ──────────────────────────────────────────────────────────────
  # JOB 2: Close stale issues/PRs (free GitHub-maintained action)
  # ──────────────────────────────────────────────────────────────
  stale:
    name: 🧹 Close Stale Issues
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.task == 'all' ||
      github.event.inputs.task == 'stale'
    permissions:
      issues: write
      pull-requests: write
 
    steps:
      - name: Mark and close stale issues
        uses: actions/stale@v9
        with:
          stale-issue-message: >
            👋 This issue has been inactive for 30 days and has been marked stale.
            It will be closed in 7 days unless there is new activity.
          close-issue-message: >
            🔒 Closed due to inactivity. Feel free to reopen if this is still relevant!
          stale-pr-message: >
            👋 This PR has been inactive for 14 days and has been marked stale.
            Please update it or it will be closed in 7 days.
          close-pr-message: >
            🔒 Closed due to inactivity.
          days-before-stale: 30
          days-before-close: 7
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-issue-label: "stale"
          exempt-issue-labels: "pinned,help wanted,bug"
          exempt-pr-labels: "pinned,work-in-progress"
 
