# ================================================================
#  WORKFLOW 1: Full CI Pipeline
#  Runs on: every push + every pull request to main/develop
#
#  JOBS (run in order):
#    lint → test (matrix: node 18/20/22) → build → smoke-test
# ================================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch when a new push arrives
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────────────────────
  # JOB 1: Lint
  # ──────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci                       # ci = faster, stricter than npm install

      - name: Run ESLint
        run: npm run lint


  # ──────────────────────────────────────────────────────────────
  # JOB 2: Test (matrix — runs 3 times in parallel)
  # ──────────────────────────────────────────────────────────────
  test:
    name: 🧪 Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint                           # only starts after lint passes
    timeout-minutes: 10

    strategy:
      fail-fast: false                    # if node 18 fails, still run node 20 + 22
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage to Codecov (free)
        if: matrix.node-version == 20    # only upload once, not 3 times
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}   # free at codecov.io
          fail_ci_if_error: false               # don't fail if Codecov is down

      - name: Upload coverage artifact
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14


  # ──────────────────────────────────────────────────────────────
  # JOB 3: Build check
  # ──────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install production deps only
        run: npm ci --omit=dev            # installs ONLY express, not jest/eslint

      - name: Verify app starts without crashing
        run: |
          node -e "require('./src/app'); console.log('✅ App loads successfully')"

      - name: Bundle size check
        run: |
          echo "📦 Production node_modules size:"
          du -sh node_modules
          echo ""
          echo "📄 App source size:"
          du -sh src/


  # ──────────────────────────────────────────────────────────────
  # JOB 4: Smoke test (start the server, hit the health endpoint)
  # ──────────────────────────────────────────────────────────────
  smoke-test:
    name: 💨 Smoke Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Start server in background
        run: |
          node src/server.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 2                         # give the server 2 seconds to boot

      - name: Hit the health endpoint
        run: |
          echo "🩺 Testing /health..."
          curl -f http://localhost:3000/health
          echo ""
          echo "✅ Server is alive!"

      - name: Test creating a todo via HTTP
        run: |
          echo "📝 Creating a todo..."
          RESULT=$(curl -s -X POST http://localhost:3000/todos \
            -H "Content-Type: application/json" \
            -d '{"title":"Smoke test todo"}')
          echo "Response: $RESULT"
          echo "$RESULT" | grep -q "Smoke test todo" && echo "✅ Todo created!" || exit 1

      - name: Stop server
        if: always()
        run: kill $SERVER_PID || true
